<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>图片制作工具 - 优化增强版</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --gold: #D4AF37; --gold-light: #F4E5BC; --gold-dark: #B8962E; --dark: #1a1a1a; --darker: #0d0d0d; --gray: #333; --light: #f5f5f5; }
body { font-family: 'Noto Sans SC', sans-serif; background: linear-gradient(145deg, var(--darker) 0%, var(--dark) 50%, #1f1f1f 100%); min-height: 100vh; color: var(--light); padding: 10px; overflow-x: hidden; }
.toolbar { max-width: 1400px; margin: 0 auto 15px; background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 100%); border: 1px solid var(--gold-dark); border-radius: 12px; padding: 12px 15px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
.toolbar-group { display: flex; align-items: center; gap: 8px; padding: 0 12px; border-right: 1px solid #444; }
.toolbar-group:last-child { border-right: none; }
.toolbar-label { font-size: 11px; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; margin-right: 5px; }
.btn { background: linear-gradient(180deg, #3a3a3a 0%, #2a2a2a 100%); border: 1px solid #555; color: var(--light); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.2s; display: flex; align-items: center; gap: 5px; user-select: none; }
.btn:hover { background: linear-gradient(180deg, #4a4a4a 0%, #3a3a3a 100%); border-color: var(--gold); color: var(--gold); }
.btn.primary { background: linear-gradient(180deg, var(--gold-dark) 0%, #9A7B1C 100%); border-color: var(--gold); color: var(--darker); font-weight: 500; }
.btn.primary:hover { background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%); }
.btn.active { background: var(--gold); color: var(--darker); border-color: var(--gold); }
.btn-sm { padding: 4px 8px; font-size: 11px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-gold { background: linear-gradient(180deg, #FFD700, #D4AF37); border: 1px solid #FFD700; color: #1a1a1a; font-weight: 600; }
.btn-vip { background: linear-gradient(180deg, #FFD700, #FFA500); border: 2px solid #FFD700; color: #1a0f00; font-weight: 700; }
.btn-fire { background: linear-gradient(180deg, #FF6B35, #D4380D); border: 1px solid #FF6B35; color: #fff; }
.btn-neon-blue { background: linear-gradient(180deg, #00D4FF, #0099CC); border: 1px solid #00D4FF; color: #001a22; }
.btn-glass { background: linear-gradient(180deg, #F5F5F5, #E0E0E0); border: 1px solid #F5F5F5; color: #1a1a1a; }
.btn-batch { background: linear-gradient(180deg, #6366f1, #4f46e5); border: 1px solid #818cf8; color: #fff; }
.btn-batch:hover { background: linear-gradient(180deg, #818cf8, #6366f1); border-color: #a5b4fc; }
input[type="file"] { display: none; }
input[type="color"] { width: 30px; height: 28px; border: 1px solid #555; border-radius: 4px; background: #2a2a2a; cursor: pointer; padding: 0; }
input[type="range"] { width: 80px; accent-color: var(--gold); cursor: pointer; }
input[type="range"]:disabled { opacity: 0.4; cursor: not-allowed; }
input[type="number"] { width: 55px; padding: 4px 6px; background: #222; border: 1px solid #444; border-radius: 4px; color: var(--gold-light); font-size: 12px; text-align: center; font-family: monospace; }
input[type="number"]:focus { outline: none; border-color: var(--gold); background: #333; color: #fff; }
input[type="number"]:hover { border-color: #666; }
input[type="date"] { width: 120px; padding: 4px 6px; background: #222; border: 1px solid #444; border-radius: 4px; color: var(--gold-light); font-size: 12px; font-family: monospace; }
input[type="date"]:focus { outline: none; border-color: var(--gold); background: #333; color: #fff; }
input:disabled { opacity: 0.5; cursor: not-allowed; }
.workspace { display: flex; justify-content: center; align-items: flex-start; gap: 20px; max-width: 1400px; margin: 0 auto; }
.workspace.layout-bottom { flex-direction: column; align-items: center; }
.layout-bottom .canvas-container { margin-bottom: 20px; }
.canvas-container { background: #111; border-radius: 16px; padding: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); position: relative; width: 100%; max-width: 600px; display: flex; justify-content: center; }
#mainCanvas { display: block; background: #222; border-radius: 4px; cursor: move; touch-action: none; max-width: 100%; height: auto; }
.canvas-container.snap-active { box-shadow: 0 0 0 2px #ff4444, 0 20px 60px rgba(0,0,0,0.6); }
.snap-line { position: absolute; pointer-events: none; z-index: 10; }
.snap-line-vertical { width: 1px; height: 100%; background: #ff4444; top: 0; }
.snap-line-horizontal { height: 1px; width: 100%; left: 0; }
.controls-panel { width: 280px; background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 100%); border: 1px solid #333; border-radius: 12px; padding: 15px; max-height: 90vh; overflow-y: auto; transition: all 0.3s; }
.bottom-panel { display: none; width: 100%; max-width: 800px; background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 100%); border: 1px solid #333; border-radius: 12px; padding: 15px; margin-top: 10px; }
.workspace.layout-bottom .controls-panel { display: none; }
.workspace.layout-bottom .bottom-panel { display: flex; flex-wrap: wrap; gap: 20px; }
.layout-bottom .control-section { width: 45%; min-width: 250px; margin-bottom: 0; }
.control-section { margin-bottom: 15px; padding-bottom: 12px; border-bottom: 1px solid #333; }
.control-section:last-child { border-bottom: none; }
.control-section h3 { font-size: 12px; color: var(--gold); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
.control-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.control-row label { font-size: 11px; color: #999; min-width: 35px; }
.control-row .value-display { font-size: 11px; color: var(--gold-light); width: 35px; text-align: right; }
.control-row .unit { font-size: 10px; color: #666; margin-left: 2px; }
.object-list { max-height: 180px; overflow-y: auto; margin-top: 5px; }
.object-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; background: #252525; border-radius: 6px; margin-bottom: 5px; font-size: 11px; cursor: pointer; border: 1px solid #3a3a3a; transition: all 0.2s; position: relative; }
.object-item:hover { border-color: #555; background: #2a2a2a; }
.object-item.selected { border-color: var(--gold); background: #2a2a20; }
.object-item.locked-item { border-color: #D4AF37; background: linear-gradient(135deg, #3a3520 0%, #2a2815 100%); }
.object-item.locked-item .layer-name { color: #aaa; }
.object-item.hidden-item { opacity: 0.4; }
.object-item.hidden-item .layer-name { text-decoration: line-through; color: #777; }
.object-item.locked-item.hidden-item { border-color: #665020; background: linear-gradient(135deg, #252015 0%, #1a1810 100%); }
.object-info { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; }
.eye-btn { background: #333; border: none; color: #888; cursor: pointer; font-size: 11px; padding: 3px 6px; border-radius: 4px; flex-shrink: 0; transition: all 0.2s; }
.eye-btn:hover { background: #444; color: #fff; }
.eye-btn.hidden-eye { background: #442222; color: #ff6666; border: 1px solid #663333; }
.lock-btn { background: #333; border: none; color: #666; cursor: pointer; font-size: 11px; padding: 3px 6px; border-radius: 4px; flex-shrink: 0; transition: all 0.2s; }
.lock-btn:hover { background: #444; color: #fff; }
.lock-btn.locked { background: linear-gradient(135deg, #D4AF37 0%, #8B7500 100%); color: #1a1a1a; border: 1px solid #FFD700; font-weight: bold; }
.layer-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 2px 4px; border-radius: 2px; }
.delete-btn { background: none; border: none; color: #555; cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; transition: all 0.2s; }
.delete-btn:hover { background: #442222; color: #ff6b6b; }
.type-icon { font-size: 12px; margin-right: 2px; }
.hint { font-size: 10px; color: #666; margin-top: 10px; padding: 8px; background: #1a1a1a; border-radius: 4px; line-height: 1.5; }
.style-preset-row { display: flex; gap: 4px; margin-bottom: 6px; flex-wrap: wrap; }
.style-preset-row .btn { flex: 1; min-width: 50px; font-size: 9px; padding: 4px 2px; }
.align-row { display: flex; gap: 4px; margin-bottom: 10px; }
.align-row label { font-size: 11px; color: #999; margin-right: 5px; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--gold); color: var(--darker); padding: 10px 20px; border-radius: 8px; font-weight: 500; opacity: 0; transition: all 0.3s; z-index: 1000; pointer-events: none; }
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.error { background: #ef4444; color: #fff; }
.toast.success { background: #22c55e; color: #fff; }
.upload-panel { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(5px); }
.upload-panel.show { display: flex; }
.upload-panel-inner { background: #1a1a1a; border: 2px dashed #444; border-radius: 16px; padding: 40px; width: 90%; max-width: 400px; text-align: center; }
.upload-panel-inner h3 { color: var(--gold); margin-bottom: 15px; }
.upload-panel-buttons { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: 10px; }
.upload-panel-buttons .btn { min-width: 150px; justify-content: center; }
.locked-hint { background: #3a3520; border: 1px solid #D4AF37; border-radius: 6px; padding: 8px 12px; margin-bottom: 10px; font-size: 11px; color: #D4AF37; text-align: center; }
.batch-panel { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); border: 1px solid #4f46e5; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
.batch-panel h4 { color: #818cf8; font-size: 11px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
.batch-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.batch-row label { font-size: 11px; color: #a5b4fc; min-width: 50px; }
.batch-row input[type="date"], .batch-row input[type="number"] { width: 100px; }
.batch-row .btn { flex: 1; }
.batch-preview { font-size: 10px; color: #6366f1; margin-top: 8px; padding: 6px; background: rgba(99, 102, 241, 0.1); border-radius: 4px; }
.batch-preview.transparent { color: #34d399; background: rgba(52, 211, 153, 0.1); }
.loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 2000; flex-direction: column; gap: 20px; }
.loading-overlay.show { display: flex; }
.loading-spinner { width: 50px; height: 50px; border: 4px solid #333; border-top: 4px solid #6366f1; border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
.loading-text { color: #fff; font-size: 14px; }
.loading-progress { color: #818cf8; font-size: 12px; }
@media (max-width: 900px) { .workspace { flex-direction: column; align-items: center; } .controls-panel { width: 100%; max-width: 600px; margin-top: 20px; } .toolbar { flex-direction: column; align-items: stretch; } .toolbar-group { border-right: none; border-bottom: 1px solid #444; padding: 10px 0; width: 100%; justify-content: center; } }
</style>
</head>
<body>
<div class="toolbar">
<div class="toolbar-group"><span class="toolbar-label">素材</span><button class="btn" onclick="showUploadPanel()">➕ 图片</button><button class="btn" onclick="addAdSlots()">📦 广告位</button></div>
<div class="toolbar-group"><span class="toolbar-label">文字</span><button class="btn primary" onclick="addTitle()">➕ 标题</button></div>
<div class="toolbar-group"><span class="toolbar-label">项目</span><button class="btn" onclick="document.getElementById('projectUpload').click()">📂 导入</button><input type="file" id="projectUpload" accept=".json" onchange="importProject(event)" style="display:none;"><button class="btn" onclick="exportProject()">💾 导出</button></div>
<div class="toolbar-group"><span class="toolbar-label">导出</span><button class="btn primary" onclick="exportCanvas(false)">PNG</button><button class="btn" onclick="exportCanvas(true)">透明</button></div>
<div class="toolbar-group" style="margin-left: auto; border-right: none;"><button class="btn" id="undoBtn" onclick="undo()" title="撤销 (Ctrl+Z)">↩️ 撤销</button><button class="btn" id="redoBtn" onclick="redo()" title="重做 (Ctrl+Shift+Z)">↪️ 重做</button><div style="width: 1px; height: 20px; background: #444; margin: 0 5px;"></div><button class="btn" id="layoutBtn" onclick="toggleLayout()">🔄 切换排版</button></div>
</div>
<div class="workspace" id="workspace">
<div class="canvas-container" id="canvasContainer">
<div id="snapLineV" class="snap-line snap-line-vertical" style="left: 50%; display: none;"></div>
<div id="snapLineH" class="snap-line snap-line-horizontal" style="top: 50%; display: none;"></div>
<canvas id="mainCanvas" width="600" height="800"></canvas>
</div>
<div class="controls-panel" id="sidePanel">
<div class="control-section"><h3>选中元素</h3><div id="selectedInfo" style="font-size: 11px; color: #999; padding: 5px 0; word-break: break-all;">未选中任何元素</div></div>
<div id="lockedHint" class="locked-hint" style="display:none;">🔒 该元素已锁定，无法移动</div>
<div class="control-section" id="transformControls" style="display:none;">
<h3>变换</h3>
<div class="control-row" id="textContentRow" style="display:none; margin-bottom: 10px;"><input type="text" id="textContentInput" placeholder="输入文字..." style="width:100%; padding:5px; background:#222; border:1px solid #444; color:#fff; border-radius:4px;" oninput="updateTextContent()"></div>
<div class="control-row"><label>X</label><input type="range" id="posX" min="0" max="600" value="300" oninput="updateTransform('posX')"><input type="number" id="posXInput" value="300" oninput="inputSyncSlider('posX')" onchange="updateTransformFromInput('posX')" onfocus="this.select()"></div>
<div class="control-row"><label>Y</label><input type="range" id="posY" min="0" max="800" value="400" oninput="updateTransform('posY')"><input type="number" id="posYInput" value="400" oninput="inputSyncSlider('posY')" onchange="updateTransformFromInput('posY')" onfocus="this.select()"></div>
<div class="control-row"><label>缩放</label><input type="range" id="scale" min="1" max="1000" value="100" oninput="updateTransform('scale')"><input type="number" id="scaleInput" value="100" min="1" max="1000" oninput="inputSyncSlider('scale')" onchange="updateTransformFromInput('scale')" onfocus="this.select()"><span class="unit">%</span></div>
<div class="control-row"><label>旋转</label><input type="range" id="rotation" min="0" max="360" value="0" oninput="updateTransform('rotation')"><input type="number" id="rotationInput" value="0" min="0" max="360" oninput="inputSyncSlider('rotation')" onchange="updateTransformFromInput('rotation')" onfocus="this.select()"><span class="unit">°</span></div>
<div class="control-row"><label>透明度</label><input type="range" id="opacity" min="0" max="100" value="100" oninput="updateTransform('opacity')"><input type="number" id="opacityInput" value="100" min="0" max="100" oninput="inputSyncSlider('opacity')" onchange="updateTransformFromInput('opacity')" onfocus="this.select()"><span class="unit">%</span></div>
<div style="display:flex; gap:5px; margin-top:8px;"><button class="btn btn-sm" id="moveUpBtn" onclick="moveLayer(-1)" style="flex:1">⬆ 上</button><button class="btn btn-sm" id="moveDownBtn" onclick="moveLayer(1)" style="flex:1">⬇ 下</button><button class="btn btn-sm" onclick="deleteSelected()" style="flex:1; color:#ff6b6b;">🗑️ 删</button></div>
</div>
<div class="control-section" id="textControls" style="display:none;">
<h3>文字样式</h3>
<div class="style-preset-row"><button class="btn btn-sm" id="preset_normal" onclick="setStylePreset('normal')">普通</button><button class="btn btn-sm btn-gold" id="preset_gold_basic" onclick="setStylePreset('gold_basic')">金</button><button class="btn btn-sm btn-vip" id="preset_vip_gold" onclick="setStylePreset('vip_gold')">VIP</button><button class="btn btn-sm btn-fire" id="preset_red_fire" onclick="setStylePreset('red_fire')">火</button></div>
<div class="style-preset-row"><button class="btn btn-sm btn-neon-blue" id="preset_blue_neon" onclick="setStylePreset('blue_neon')">蓝</button><button class="btn btn-sm" style="background:#660099; color:white; border-color:#660099" id="preset_purple_glow" onclick="setStylePreset('purple_glow')">紫</button><button class="btn btn-sm btn-glass" id="preset_white_glass" onclick="setStylePreset('white_glass')">白</button></div>
<div class="control-row" style="margin-top:10px;"><label>字号</label><input type="range" id="fontSize" min="12" max="200" value="48" oninput="updateText('fontSize')"><input type="number" id="fontSizeInput" value="48" min="12" max="200" oninput="inputSyncSlider('fontSize')" onchange="updateTextFromInput('fontSize')" onfocus="this.select()"><span class="unit">px</span></div>
<div class="control-row"><label>颜色</label><input type="color" id="textColor" value="#D4AF37" onchange="updateTextColor()"></div>
</div>
<div class="batch-panel">
<h4>📦 批量生成（透明PNG）</h4>
<div class="batch-row"><label>开始日期</label><input type="date" id="batchStartDate" value="2026-01-01"></div>
<div class="batch-row"><label>结束日期</label><input type="date" id="batchEndDate" value="2026-01-30"></div>
<div class="batch-row"><label>每日数量</label><input type="number" id="batchCount" value="4" min="1" max="100"></div>
<div class="batch-row"><button class="btn btn-batch" id="batchGenerateBtn" onclick="batchGenerate()">🚀 批量生成</button></div>
<div class="batch-preview transparent" id="batchPreview">将生成 120 张透明PNG</div>
</div>
<div class="control-section"><h3>图层列表 <span style="font-size:10px; color:#666; float:right;">👁显示 🔒锁定</span></h3><div class="object-list" id="objectList"></div></div>
<div class="hint">💡 提示：拖拽/粘贴添加图片 · 双击重命名 · 支持撤销/重做</div>
</div>
<div class="bottom-panel" id="bottomPanel">
<div style="width: 100%; display: flex; gap: 20px; flex-wrap: wrap;">
<div style="flex:1; min-width: 300px;">
<div class="control-section"><h3>选中元素属性</h3><div id="selectedInfoBottom" style="font-size: 11px; color: #999; padding: 5px 0;">未选中</div></div>
<div id="lockedHintB" class="locked-hint" style="display:none;">🔒 该元素已锁定，无法移动</div>
<div id="transformControlsBottom">
<div class="control-row" id="textContentRowB" style="display:none; margin-bottom: 10px;"><input type="text" id="textContentInputB" style="width:100%; padding:5px; background:#222; border:1px solid #444; color:#fff;" oninput="updateTextContent()"></div>
<div class="control-row"><label>X</label><input type="range" id="posXB" min="0" max="600" oninput="updateTransform('posXB')"><input type="number" id="posXBInput" oninput="inputSyncSlider('posXB')" onchange="updateTransformFromInput('posXB')" onfocus="this.select()"></div>
<div class="control-row"><label>Y</label><input type="range" id="posYB" min="0" max="800" oninput="updateTransform('posYB')"><input type="number" id="posYBInput" oninput="inputSyncSlider('posYB')" onchange="updateTransformFromInput('posYB')" onfocus="this.select()"></div>
<div class="control-row"><label>缩放</label><input type="range" id="scaleB" min="1" max="1000" oninput="updateTransform('scaleB')"><input type="number" id="scaleBInput" min="1" max="1000" oninput="inputSyncSlider('scaleB')" onchange="updateTransformFromInput('scaleB')" onfocus="this.select()"><span class="unit">%</span></div>
<div style="margin-top:5px;"><button class="btn btn-sm" onclick="deleteSelected()">删除</button><button class="btn btn-sm" onclick="moveLayer(-1)">上移</button><button class="btn btn-sm" onclick="moveLayer(1)">下移</button></div>
</div>
<div id="textControlsBottom" style="display:none; margin-top:10px;"><div class="control-row"><label>字号</label><input type="number" id="fontSizeB" min="12" max="200" oninput="inputSyncSlider('fontSizeB')" onchange="updateTextFromInput('fontSizeB')" onfocus="this.select()"><span class="unit">px</span></div><div class="style-preset-row"><button class="btn btn-sm btn-gold" onclick="setStylePreset('gold_basic')">金</button><button class="btn btn-sm btn-vip" onclick="setStylePreset('vip_gold')">VIP</button><button class="btn btn-sm btn-fire" onclick="setStylePreset('red_fire')">火</button></div></div>
</div>
<div style="flex:1; min-width: 300px;"><div class="control-section"><h3>图层</h3><div class="object-list" id="objectListBottom"></div></div></div>
</div>
</div>
</div>
<div class="upload-panel" id="uploadPanel">
<div class="upload-panel-inner">
<h3>添加图片</h3>
<p style="color:#888; font-size:12px; margin-bottom:15px;">拖拽图片 · 点击上传 · Ctrl+V 粘贴</p>
<div class="upload-panel-buttons"><button class="btn primary" onclick="document.getElementById('imgUpload').click()">📁 选择图片</button><button class="btn" onclick="hideUploadPanel()">✖ 取消</button></div>
<input type="file" id="imgUpload" accept="image/*" onchange="handleImgUpload(event)" style="display:none;">
</div>
</div>
<div class="toast" id="toast">提示</div>
<div class="loading-overlay" id="loadingOverlay">
<div class="loading-spinner"></div>
<div class="loading-text">正在生成透明PNG...</div>
<div class="loading-progress" id="loadingProgress">0 / 0</div>

const lockIcon = el.locked ? '🔒' : '🔓';
item.innerHTML = `<div class="object-info"><button class="eye-btn ${el.visible === false ? 'hidden-eye' : ''}" onclick="toggleVisibility(${i}, event)" title="${el.visible === false ? '显示' : '隐藏'}">${eyeIcon}</button><button class="lock-btn ${el.locked?'locked':''}" onclick="toggleLock(${i}, event)" title="${el.locked ? '已锁定' : '未锁定'}">${lockIcon}</button><span class="layer-name"><span class="type-icon">${icon}</span> ${el.name || el.text}</span></div><button class="delete-btn" onclick="deleteElement(${i}, event)" title="删除">×</button>`;
item.onclick = e => { if(e.target.tagName!=='BUTTON'){ selectedIndex=i; markDirty(); updateObjectList(); updateControls(); } };
return item;
};
list1.innerHTML = '';
list2.innerHTML = '';
for (let i = elements.length-1; i>=0; i--) { list1.appendChild(createItem(elements[i], i)); list2.appendChild(createItem(elements[i], i)); }
}
function toggleVisibility(i, e) { e.stopPropagation(); elements[i].visible = !elements[i].visible; markDirty(); updateObjectList(); if (selectedIndex === i) updateControls(); }
function toggleLock(i, e) { e.stopPropagation(); elements[i].locked=!elements[i].locked; markDirty(); updateObjectList(); updateControls(); showToast(elements[i].locked?'已锁定':'已解锁'); }
function deleteElement(i, e) { e.stopPropagation(); elements.splice(i,1); if(selectedIndex===i) selectedIndex=-1; else if(selectedIndex>i) selectedIndex--; markDirty(); updateObjectList(); updateControls(); saveState(); }
function toggleLayout() {
const ws = document.getElementById('workspace');
if (layoutMode === 'side') { layoutMode = 'bottom'; ws.classList.add('layout-bottom'); }
else { layoutMode = 'side'; ws.classList.remove('layout-bottom'); }
showToast(layoutMode === 'bottom' ? '已切换到底部模式' : '已切换到侧边模式');
}
function serializeElements() { return JSON.stringify(elements.map(e => { const o = {...e}; if(o.img) { o.imgData = imageToDataURL(o.img); delete o.img; } return o; })); }
async function deserializeElements(json) { const arr = JSON.parse(json); for(let el of arr) { if(el.imgData) { el.img = await dataURLToImage(el.imgData); } if(el.type === 'text') el.cache = null; } return arr; }
function saveState() {
const state = serializeElements();
if (historyIndex < history.length - 1) { history = history.slice(0, historyIndex + 1); }
history.push(state);
if (history.length > MAX_HISTORY) history.shift();
historyIndex = history.length - 1;
updateUndoRedoButtons();
}
async function undo() { if (historyIndex > 0) { historyIndex--; await restoreState(history[historyIndex]); } }
async function redo() { if (historyIndex < history.length - 1) { historyIndex++; await restoreState(history[historyIndex]); } }
async function restoreState(json) { const newEls = await deserializeElements(json); elements = newEls; selectedIndex = -1; markDirty(); updateObjectList(); updateControls(); updateUndoRedoButtons(); }
function updateUndoRedoButtons() { document.getElementById('undoBtn').disabled = historyIndex <= 0; document.getElementById('redoBtn').disabled = historyIndex >= history.length - 1; }
function addAdSlots() {
elements.unshift({ type: 'imageSlot', name: '游戏商', width: 235, height: 169, x: canvasConfig.width - 235/2 - 15, y: 15 + 169/2, img: null, imgData: null, scale: 1, rotation: 0, opacity: 1, locked: false, visible: true });
elements.unshift({ type: 'imageSlot', name: '游戏', width: 235, height: 235, x: canvasConfig.width - 235/2 - 15, y: 15 + 169 + 15 + 235/2, img: null, imgData: null, scale: 1, rotation: 0, opacity: 1, locked: false, visible: true });
selectedIndex = -1;
markDirty();
updateObjectList();
updateControls();
saveState();
showToast('已添加广告位');
}
function addTitle(text) {
const defaultText = text || '标题文字';
const el = { type: 'text', text: defaultText, fontSize: 48, color: '#D4AF37', align: 'center', x: canvasConfig.width/2, y: 200, rotation: 0, opacity: 1, isTitle: true, stylePreset: 'normal', name: '标题', useGradient: true, gradientColor1: '#D4AF37', gradientColor2: '#F4E5BC', locked: false, visible: true, cache: null };
elements.unshift(el);
selectedIndex = 0;
markDirty();
updateObjectList();
updateControls();
saveState();
showToast('标题添加成功');
}
function handleImgUpload(e) { if (e.target.files[0]) { handleImageFile(e.target.files[0]); hideUploadPanel(); } }
function handleImageFile(file) {
const r = new FileReader();
r.onload = ev => {
const i = new Image();
i.onload = () => {
if (selectedIndex >= 0 && elements[selectedIndex].type === 'imageSlot') {
elements[selectedIndex].img = i;
elements[selectedIndex].imgData = imageToDataURL(i);
markDirty();
updateControls();
saveState();
showToast('图片替换成功');
return;
}
const scale = Math.max(canvasConfig.width / i.width, canvasConfig.height / i.height);
const scaledWidth = i.width * scale;
const scaledHeight = i.height * scale;
const el = { type: 'image', img: i, imgData: imageToDataURL(i), x: canvasConfig.width / 2, y: canvasConfig.height / 2, width: scaledWidth, height: scaledHeight, scale: 1, rotation: 0, opacity: 1, name: file.name.replace(/\.[^/.]+$/, '').substring(0,15)||'图片', locked: false, visible: true };
elements.unshift(el);
selectedIndex = 0;
markDirty();
updateObjectList();
updateControls();
saveState();
showToast('图片添加成功（已贴合边框）');
};
i.src = ev.target.result;
};
r.readAsDataURL(file);
}
function handlePaste(e) { const items = (e.clipboardData || e.originalEvent.clipboardData).items; for (let item of items) { if (item.type.indexOf('image') !== -1) { handleImageFile(item.getAsFile()); break; } } }
function exportProject() {
const d = { version: '1.0', elements: elements.map(e => { const b = { type: e.type, x:e.x, y:e.y, scale:e.scale, rotation:e.rotation, opacity:e.opacity, name:e.name, locked:e.locked, visible:e.visible }; if (e.type === 'image' || e.type === 'imageSlot') { b.imgData = e.imgData; b.width=e.width; b.height=e.height; } else if (e.type === 'text') { b.text=e.text; b.fontSize=e.fontSize; b.color=e.color; b.align=e.align; b.stylePreset=e.stylePreset; b.gradientColor1=e.gradientColor1; b.gradientColor2=e.gradientColor2; } return b; })};
const b = new Blob([JSON.stringify(d)], {type:'application/json'});
const a = document.createElement('a');
a.download='poster-project.json';
a.href=URL.createObjectURL(b);
a.click();
showToast('项目已导出');
}
async function importProject(evt) {
const f = evt.target.files[0];
if (!f) return;
const r = new FileReader();
r.onload = async e => {
try {
const data = JSON.parse(e.target.result);
elements = [];
for (const ed of data.elements) {
if (ed.type === 'image' || ed.type === 'imageSlot') { const img = ed.imgData ? await dataURLToImage(ed.imgData) : null; elements.push({ ...ed, img }); }
else { elements.push({ ...ed, cache: null }); }
}
selectedIndex = -1;
markDirty();
updateObjectList();
updateControls();
saveState();
showToast('项目导入成功');
} catch(err) { console.error(err); showToast('导入失败'); }
};
r.readAsText(f);
}
function exportCanvasToBase64(transparent) {
const ec = document.createElement('canvas');
const scale = 2;
ec.width = 600 * scale;
ec.height = 800 * scale;
const ectx = ec.getContext('2d');
ectx.scale(scale, scale);
if (!transparent) { ectx.fillStyle = '#1a1a1a'; ectx.fillRect(0,0,600,800); }
elements.forEach(el => {
if(el.visible === false) return;
ectx.save();
ectx.globalAlpha = el.opacity;
if (el.type === 'text') renderText(ectx, el);
else if (el.img) { ectx.translate(el.x, el.y); ectx.rotate(el.rotation*Math.PI/180); const w = el.width*(el.scale||1); const h = el.height*(el.scale||1); ectx.drawImage(el.img, -w/2, -h/2, w, h); }
ectx.restore();
});
return ec.toDataURL('image/png');
}
function exportCanvas(transparent) {
const dataURL = exportCanvasToBase64(transparent);
const a = document.createElement('a');
a.download = transparent ? 'poster-t.png' : 'poster.png';
a.href = dataURL;
a.click();
showToast('已导出PNG');
}
function showUploadPanel() { document.getElementById('uploadPanel').classList.add('show'); }
function hideUploadPanel() { document.getElementById('uploadPanel').classList.remove('show'); }
function showToast(msg, type = '') { const t = document.getElementById('toast'); t.textContent = msg; t.className = 'toast show ' + type; setTimeout(() => t.classList.remove('show'), 2000); }
const dz = document.querySelector('.upload-panel-inner');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.style.borderColor = '#D4AF37'; });
dz.addEventListener('dragleave', () => dz.style.borderColor='#444');
dz.addEventListener('drop', e => { e.preventDefault(); dz.style.borderColor='#444'; if(e.dataTransfer.files[0]) { handleImageFile(e.dataTransfer.files[0]); hideUploadPanel(); } });
function generateRandomTime() { const hour = Math.floor(Math.random() * 12) + 1; const minute = Math.floor(Math.random() * 60); const ampm = Math.random() < 0.5 ? 'AM' : 'PM'; return { hour: hour.toString().padStart(2, '0'), minute: minute.toString().padStart(2, '0'), ampm: ampm }; }
function generateRandomAmount() { const amount = Math.floor(Math.random() * (12000 - 4000 + 1)) + 4000; if (Math.random() < 0.9) { return { amount: Math.round(amount / 100) * 100 }; } else { return { amount: amount }; } }
function formatAmountForDisplay(amount) { return 'MYR ' + amount.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}); }
function formatAmountForTitle(amount) { return 'RM ' + amount.toString(); }
function findElementByName(name) { return elements.find(el => el.name === name); }
async function batchGenerate() {
const startDate = document.getElementById('batchStartDate').value;
const endDate = document.getElementById('batchEndDate').value;
const perDay = parseInt(document.getElementById('batchCount').value);
if (!startDate || !endDate || !perDay) { showToast('请输入完整参数', 'error'); return; }
const startDateObj = new Date(startDate);
const endDateObj = new Date(endDate);
if (startDateObj > endDateObj) { showToast('开始日期不能晚于结束日期', 'error'); return; }
const days = Math.ceil((endDateObj - startDateObj) / (1000 * 60 * 60 * 24)) + 1;
const totalImages = days * perDay;
if (totalImages > 1000) { if (!confirm(`将生成 ${totalImages} 张图片，可能需要较长时间。是否继续？`)) { return; } }
const dateEl = findElementByName('日期');
const amountEl = findElementByName('金额');
const titleEl = findElementByName('标题');
if (!dateEl || !amountEl || !titleEl) { showToast('模板中缺少必要的图层（日期、金额、标题）', 'error'); return; }
const original = JSON.stringify(elements);
document.getElementById('loadingOverlay').classList.add('show');
const btn = document.getElementById('batchGenerateBtn');
btn.disabled = true;
const zip = new JSZip();
let current = 0;
const progressEl = document.getElementById('loadingProgress');
progressEl.textContent = `0 / ${totalImages}`;
try {
for (let d = 0; d < days; d++) {
const currentDate = new Date(startDateObj);
currentDate.setDate(startDateObj.getDate() + d);
const dateStr = currentDate.toISOString().split('T')[0];
for (let i = 0; i < perDay; i++) {
current++;
elements = JSON.parse(original);
const time = generateRandomTime();
const amountData = generateRandomAmount();
const dateText = `${dateStr} ${time.hour}:${time.minute} ${time.ampm}`;
dateEl.text = dateText;
amountEl.text = formatAmountForDisplay(amountData.amount);
titleEl.text = formatAmountForTitle(amountData.amount);
if (dateEl.cache) dateEl.cache = null;
if (amountEl.cache) amountEl.cache = null;
if (titleEl.cache) titleEl.cache = null;
markDirty();
await new Promise(r => setTimeout(r, 30));
// 【修改】使用 true 参数生成透明PNG
const base64 = exportCanvasToBase64(true);
const blob = await (await fetch(base64)).blob();
const fileName = `${dateStr}_${time.hour}-${time.minute}-${time.ampm}.png`;
zip.file(fileName, blob);
progressEl.textContent = `${current} / ${totalImages}`;
if (current % 10 === 0) await new Promise(r => setTimeout(r, 1));
}
}
progressEl.textContent = '正在打包...';
const zipBlob = await zip.generateAsync({ type: 'blob' });
const a = document.createElement('a');
a.download = 'batch_images.zip';
a.href = URL.createObjectURL(zipBlob);
a.click();
elements = JSON.parse(original);
markDirty();
updateObjectList();
updateControls();
showToast(`已生成并下载 ${totalImages} 张透明PNG`, 'success');
} catch (err) { console.error(err); showToast('生成失败: ' + err.message, 'error'); }
finally { document.getElementById('loadingOverlay').classList.remove('show'); btn.disabled = false; }
}
init();
</script>
