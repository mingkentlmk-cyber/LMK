<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>图片制作工具 - 优化增强版</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --gold: #D4AF37; --gold-light: #F4E5BC; --gold-dark: #B8962E; --dark: #1a1a1a; --darker: #0d0d0d; --gray: #333; --light: #f5f5f5; }
body { font-family: 'Noto Sans SC', sans-serif; background: linear-gradient(145deg, var(--darker) 0%, var(--dark) 50%, #1f1f1f 100%); min-height: 100vh; color: var(--light); padding: 10px; overflow-x: hidden; }
/* 工具栏 */
.toolbar { max-width: 1400px; margin: 0 auto 15px; background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 100%); border: 1px solid var(--gold-dark); border-radius: 12px; padding: 12px 15px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
.toolbar-group { display: flex; align-items: center; gap: 8px; padding: 0 12px; border-right: 1px solid #444; }
.toolbar-group:last-child { border-right: none; }
.toolbar-label { font-size: 11px; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; margin-right: 5px; }
/* 按钮 */
.btn { background: linear-gradient(180deg, #3a3a3a 0%, #2a2a2a 100%); border: 1px solid #555; color: var(--light); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.2s; display: flex; align-items: center; gap: 5px; user-select: none; }
.btn:hover { background: linear-gradient(180deg, #4a4a4a 0%, #3a3a3a 100%); border-color: var(--gold); color: var(--gold); }
.btn.primary { background: linear-gradient(180deg, var(--gold-dark) 0%, #9A7B1C 100%); border-color: var(--gold); color: var(--darker); font-weight: 500; }
.btn.primary:hover { background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%); }
.btn.active { background: var(--gold); color: var(--darker); border-color: var(--gold); }
.btn-sm { padding: 4px 8px; font-size: 11px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-gold { background: linear-gradient(180deg, #FFD700, #D4AF37); border: 1px solid #FFD700; color: #1a1a1a; font-weight: 600; }
.btn-vip { background: linear-gradient(180deg, #FFD700, #FFA500); border: 2px solid #FFD700; color: #1a0f00; font-weight: 700; }
.btn-fire { background: linear-gradient(180deg, #FF6B35, #D4380D); border: 1px solid #FF6B35; color: #fff; }
.btn-neon-blue { background: linear-gradient(180deg, #00D4FF, #0099CC); border: 1px solid #00D4FF; color: #001a22; }
.btn-glass { background: linear-gradient(180deg, #F5F5F5, #E0E0E0); border: 1px solid #F5F5F5; color: #1a1a1a; }
/* 输入 */
input[type="file"] { display: none; }
input[type="color"] { width: 30px; height: 28px; border: 1px solid #555; border-radius: 4px; background: #2a2a2a; cursor: pointer; padding: 0; }
input[type="range"] { width: 80px; accent-color: var(--gold); cursor: pointer; }
/* 数字输入框 - 优化样式 */
input[type="number"] { 
    width: 55px; 
    padding: 4px 6px; 
    background: #222; 
    border: 1px solid #444; 
    border-radius: 4px; 
    color: var(--gold-light); 
    font-size: 12px; 
    text-align: center; 
    font-family: monospace;
}
input[type="number"]:focus { 
    outline: none; 
    border-color: var(--gold); 
    background: #333;
    color: #fff;
}
input[type="number"]:hover { border-color: #666; }
/* 布局 */
.workspace { display: flex; justify-content: center; align-items: flex-start; gap: 20px; max-width: 1400px; margin: 0 auto; }
.workspace.layout-bottom { flex-direction: column; align-items: center; }
.layout-bottom .canvas-container { margin-bottom: 20px; }
.canvas-container { background: #111; border-radius: 16px; padding: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); position: relative; width: 100%; max-width: 600px; display: flex; justify-content: center; }
#mainCanvas { display: block; background: #222; border-radius: 4px; cursor: move; touch-action: none; max-width: 100%; height: auto; }
/* 侧边栏面板 */
.controls-panel { width: 280px; background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 100%); border: 1px solid #333; border-radius: 12px; padding: 15px; max-height: 90vh; overflow-y: auto; transition: all 0.3s; }
/* 底部面板 */
.bottom-panel { display: none; width: 100%; max-width: 800px; background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 100%); border: 1px solid #333; border-radius: 12px; padding: 15px; margin-top: 10px; }
.workspace.layout-bottom .controls-panel { display: none; }
.workspace.layout-bottom .bottom-panel { display: flex; flex-wrap: wrap; gap: 20px; }
.layout-bottom .control-section { width: 45%; min-width: 250px; margin-bottom: 0; }
/* 控件通用 */
.control-section { margin-bottom: 15px; padding-bottom: 12px; border-bottom: 1px solid #333; }
.control-section:last-child { border-bottom: none; }
.control-section h3 { font-size: 12px; color: var(--gold); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
.control-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.control-row label { font-size: 11px; color: #999; min-width: 35px; }
.control-row .value-display { font-size: 11px; color: var(--gold-light); width: 35px; text-align: right; }
.control-row .unit { font-size: 10px; color: #666; margin-left: 2px; }
/* 图层列表 */
.object-list { max-height: 180px; overflow-y: auto; margin-top: 5px; }
.object-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; background: #222; border-radius: 4px; margin-bottom: 4px; font-size: 11px; cursor: pointer; border: 1px solid transparent; transition: all 0.15s; }
.object-item:hover { border-color: #444; }
.object-item.selected { border-color: var(--gold); background: #2a2a20; }
.object-item.hidden-item { opacity: 0.4; }
.object-info { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; }
.eye-btn, .lock-btn { background: none; border: none; color: #666; cursor: pointer; font-size: 12px; padding: 0 4px; flex-shrink: 0; }
.eye-btn:hover, .lock-btn:hover { color: #fff; }
.eye-btn.hidden-eye { color: #444; }
.lock-btn.locked { color: var(--gold); }
.layer-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 2px; border-radius: 2px; }
.delete-btn { background: none; border: none; color: #666; cursor: pointer; font-size: 14px; padding: 0 4px; }
.delete-btn:hover { color: #e74c3c; }
.hint { font-size: 10px; color: #666; margin-top: 10px; padding: 8px; background: #1a1a1a; border-radius: 4px; line-height: 1.5; }
.style-preset-row { display: flex; gap: 4px; margin-bottom: 6px; flex-wrap: wrap; }
.style-preset-row .btn { flex: 1; min-width: 50px; font-size: 9px; padding: 4px 2px; }
.align-row { display: flex; gap: 4px; margin-bottom: 10px; }
.align-row label { font-size: 11px; color: #999; margin-right: 5px; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--gold); color: var(--darker); padding: 10px 20px; border-radius: 8px; font-weight: 500; opacity: 0; transition: all 0.3s; z-index: 1000; pointer-events: none; }
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.upload-panel { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(5px); }
.upload-panel.show { display: flex; }
.upload-panel-inner { background: #1a1a1a; border: 2px dashed #444; border-radius: 16px; padding: 40px; width: 90%; max-width: 400px; text-align: center; }
.upload-panel-inner h3 { color: var(--gold); margin-bottom: 15px; }
@media (max-width: 900px) {
    .workspace { flex-direction: column; align-items: center; }
    .controls-panel { width: 100%; max-width: 600px; margin-top: 20px; }
    .toolbar { flex-direction: column; align-items: stretch; }
    .toolbar-group { border-right: none; border-bottom: 1px solid #444; padding: 10px 0; width: 100%; justify-content: center; }
}
</style>
</head>
<body>
<div class="toolbar">
    <div class="toolbar-group">
        <span class="toolbar-label">素材</span>
        <button class="btn" onclick="showUploadPanel()">➕ 图片</button>
        <button class="btn" onclick="addAdSlots()">📦 广告位</button>
    </div>
    <div class="toolbar-group">
        <span class="toolbar-label">文字</span>
        <button class="btn primary" onclick="addTitle()">➕ 标题</button>
    </div>
    <div class="toolbar-group">
        <span class="toolbar-label">项目</span>
        <button class="btn" onclick="document.getElementById('projectUpload').click()">📂 导入</button>
        <input type="file" id="projectUpload" accept=".json" onchange="importProject(event)" style="display:none;">
        <button class="btn" onclick="exportProject()">💾 导出</button>
    </div>
    <div class="toolbar-group">
        <span class="toolbar-label">导出</span>
        <button class="btn primary" onclick="exportCanvas(false)">PNG</button>
        <button class="btn" onclick="exportCanvas(true)">透明</button>
    </div>
    <div class="toolbar-group" style="margin-left: auto; border-right: none;">
        <button class="btn" id="undoBtn" onclick="undo()" title="撤销 (Ctrl+Z)">↩️ 撤销</button>
        <button class="btn" id="redoBtn" onclick="redo()" title="重做 (Ctrl+Shift+Z)">↪️ 重做</button>
        <div style="width: 1px; height: 20px; background: #444; margin: 0 5px;"></div>
        <button class="btn" id="layoutBtn" onclick="toggleLayout()">🔄 切换排版</button>
    </div>
</div>

<div class="workspace" id="workspace">
    <div class="canvas-container" id="canvasContainer">
        <canvas id="mainCanvas" width="600" height="800"></canvas>
    </div>
    
    <!-- 侧边栏面板 -->
    <div class="controls-panel" id="sidePanel">
        <div class="control-section">
            <h3>选中元素</h3>
            <div id="selectedInfo" style="font-size: 11px; color: #999; padding: 5px 0; word-break: break-all;">未选中任何元素</div>
        </div>
        
        <div class="control-section" id="transformControls" style="display:none;">
            <h3>变换</h3>
            <div class="control-row" id="textContentRow" style="display:none; margin-bottom: 10px;">
                <input type="text" id="textContentInput" placeholder="输入文字..." style="width:100%; padding:5px; background:#222; border:1px solid #444; color:#fff; border-radius:4px;" oninput="updateTextContent()">
            </div>
            <!-- X位置 -->
            <div class="control-row">
                <label>X</label>
                <input type="range" id="posX" min="0" max="600" value="300" oninput="updateTransform('posX')">
                <input type="number" id="posXInput" value="300" min="0" max="600" oninput="updateTransformFromInput('posX')" onfocus="this.select()">
            </div>
            <!-- Y位置 -->
            <div class="control-row">
                <label>Y</label>
                <input type="range" id="posY" min="0" max="800" value="400" oninput="updateTransform('posY')">
                <input type="number" id="posYInput" value="400" min="0" max="800" oninput="updateTransformFromInput('posY')" onfocus="this.select()">
            </div>
            <!-- 缩放 -->
            <div class="control-row">
                <label>缩放</label>
                <input type="range" id="scale" min="10" max="300" value="100" oninput="updateTransform('scale')">
                <input type="number" id="scaleInput" value="100" min="10" max="300" oninput="updateTransformFromInput('scale')" onfocus="this.select()">
                <span class="unit">%</span>
            </div>
            <!-- 旋转 -->
            <div class="control-row">
                <label>旋转</label>
                <input type="range" id="rotation" min="0" max="360" value="0" oninput="updateTransform('rotation')">
                <input type="number" id="rotationInput" value="0" min="0" max="360" oninput="updateTransformFromInput('rotation')" onfocus="this.select()">
                <span class="unit">°</span>
            </div>
            <!-- 透明度 -->
            <div class="control-row">
                <label>透明度</label>
                <input type="range" id="opacity" min="0" max="100" value="100" oninput="updateTransform('opacity')">
                <input type="number" id="opacityInput" value="100" min="0" max="100" oninput="updateTransformFromInput('opacity')" onfocus="this.select()">
                <span class="unit">%</span>
            </div>
            
            <div style="display:flex; gap:5px; margin-top:8px;">
                <button class="btn btn-sm" id="moveUpBtn" onclick="moveLayer(-1)" style="flex:1">⬆ 上</button>
                <button class="btn btn-sm" id="moveDownBtn" onclick="moveLayer(1)" style="flex:1">⬇ 下</button>
                <button class="btn btn-sm" onclick="deleteSelected()" style="flex:1; color:#ff6b6b;">🗑️ 删</button>
            </div>
        </div>
        
        <div class="control-section" id="textControls" style="display:none;">
            <h3>文字样式</h3>
            <div class="style-preset-row">
                <button class="btn btn-sm" id="preset_normal" onclick="setStylePreset('normal')">普通</button>
                <button class="btn btn-sm btn-gold" id="preset_gold_basic" onclick="setStylePreset('gold_basic')">金</button>
                <button class="btn btn-sm btn-vip" id="preset_vip_gold" onclick="setStylePreset('vip_gold')">VIP</button>
                <button class="btn btn-sm btn-fire" id="preset_red_fire" onclick="setStylePreset('red_fire')">火</button>
            </div>
            <div class="style-preset-row">
                <button class="btn btn-sm btn-neon-blue" id="preset_blue_neon" onclick="setStylePreset('blue_neon')">蓝</button>
                <button class="btn btn-sm" style="background:#660099; color:white; border-color:#660099" id="preset_purple_glow" onclick="setStylePreset('purple_glow')">紫</button>
                <button class="btn btn-sm btn-glass" id="preset_white_glass" onclick="setStylePreset('white_glass')">白</button>
            </div>
            <div class="control-row" style="margin-top:10px;">
                <label>字号</label>
                <input type="range" id="fontSize" min="12" max="150" value="48" oninput="updateText('fontSize')">
                <input type="number" id="fontSizeInput" value="48" min="12" max="150" oninput="updateTextFromInput('fontSize')" onfocus="this.select()">
                <span class="unit">px</span>
            </div>
            <div class="control-row">
                <label>颜色</label>
                <input type="color" id="textColor" value="#D4AF37" onchange="updateTextColor()">
            </div>
        </div>
        
        <div class="control-section">
            <h3>图层列表 <span style="font-size:10px; color:#666; float:right;">点击眼睛显隐</span></h3>
            <div class="object-list" id="objectList"></div>
        </div>
        <div class="hint">💡 提示：拖拽/粘贴添加图片 · 双击重命名 · 支持撤销/重做</div>
    </div>
    
    <!-- 底部面板 -->
    <div class="bottom-panel" id="bottomPanel">
        <div style="width: 100%; display: flex; gap: 20px; flex-wrap: wrap;">
            <div style="flex:1; min-width: 300px;">
                <div class="control-section">
                    <h3>选中元素属性</h3>
                    <div id="selectedInfoBottom" style="font-size: 11px; color: #999; padding: 5px 0;">未选中</div>
                </div>
                <div id="transformControlsBottom">
                    <div class="control-row" id="textContentRowB" style="display:none; margin-bottom: 10px;">
                        <input type="text" id="textContentInputB" style="width:100%; padding:5px; background:#222; border:1px solid #444; color:#fff;" oninput="updateTextContent()">
                    </div>
                    <div class="control-row"><label>X</label> <input type="range" id="posXB" min="0" max="600" oninput="updateTransform('posXB')"> <input type="number" id="posXBInput" oninput="updateTransformFromInput('posXB')" onfocus="this.select()"></div>
                    <div class="control-row"><label>Y</label> <input type="range" id="posYB" min="0" max="800" oninput="updateTransform('posYB')"> <input type="number" id="posYBInput" oninput="updateTransformFromInput('posYB')" onfocus="this.select()"></div>
                    <div class="control-row"><label>缩放</label> <input type="range" id="scaleB" min="10" max="300" oninput="updateTransform('scaleB')"> <input type="number" id="scaleBInput" oninput="updateTransformFromInput('scaleB')" onfocus="this.select()"> <span class="unit">%</span></div>
                    <div style="margin-top:5px;">
                        <button class="btn btn-sm" onclick="deleteSelected()">删除</button>
                        <button class="btn btn-sm" onclick="moveLayer(-1)">上移</button>
                        <button class="btn btn-sm" onclick="moveLayer(1)">下移</button>
                    </div>
                </div>
                <div id="textControlsBottom" style="display:none; margin-top:10px;">
                    <div class="control-row"><label>字号</label> <input type="number" id="fontSizeB" oninput="updateTextFromInput('fontSizeB')" onfocus="this.select()"> <span class="unit">px</span></div>
                    <div class="style-preset-row">
                        <button class="btn btn-sm btn-gold" onclick="setStylePreset('gold_basic')">金</button>
                        <button class="btn btn-sm btn-vip" onclick="setStylePreset('vip_gold')">VIP</button>
                        <button class="btn btn-sm btn-fire" onclick="setStylePreset('red_fire')">火</button>
                    </div>
                </div>
            </div>
            <div style="flex:1; min-width: 300px;">
                <div class="control-section">
                    <h3>图层</h3>
                    <div class="object-list" id="objectListBottom"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 上传面板 -->
<div class="upload-panel" id="uploadPanel">
    <div class="upload-panel-inner">
        <h3>添加图片</h3>
        <p style="color:#888; font-size:12px; margin-bottom:15px;">拖拽图片 · 点击上传 · Ctrl+V 粘贴</p>
        <button class="btn primary" onclick="document.getElementById('imgUpload').click()">选择图片</button>
        <input type="file" id="imgUpload" accept="image/*" onchange="handleImgUpload(event)" style="display:none;">
    </div>
</div>

<div class="toast" id="toast">提示</div>

<script>
/** 配置与预设 **/
const textPresetConfig = {
    normal: { useGradient: true, gradientColor1: '#D4AF37', gradientColor2: '#F4E5BC' },
    gold_basic: { gradientStops: [{pos:0,color:'#5A3A00'},{pos:0.25,color:'#D4AF37'},{pos:0.45,color:'#FFF8DC'},{pos:0.55,color:'#FFF8DC'},{pos:0.75,color:'#D4AF37'},{pos:1,color:'#5A3A00'}], depthLayers: [{offsetX:1,offsetY:1,color:'#4A3520'},{offsetX:2,offsetY:2,color:'#3D2817'}], outerStroke: [{color:'#8B6914',width:6},{color:'#FFD700',width:3}], glow: {color:'rgba(255,215,0,0.6)',blur:20} },
    vip_gold: { gradientStops: [{pos:0,color:'#8B4513'},{pos:0.2,color:'#D4AF37'},{pos:0.4,color:'#FFD700'},{pos:0.48,color:'#FFE44D'},{pos:0.52,color:'#FFE44D'},{pos:0.6,color:'#FFD700'},{pos:0.8,color:'#D4AF37'},{pos:1,color:'#8B4513'}], depthLayers: [{offsetX:1,offsetY:1,color:'#6B3410'},{offsetX:2,offsetY:2,color:'#4A230C'},{offsetX:3,offsetY:3,color:'#2A1208'}], outerStroke: [{color:'#FF8C00',width:8},{color:'#FFD700',width:5}], glow: {color:'rgba(255,180,0,0.8)',blur:25} },
    red_fire: { gradientStops: [{pos:0,color:'#5A1A00'},{pos:0.25,color:'#D4380D'},{pos:0.45,color:'#FF6B35'},{pos:0.55,color:'#FFB366'},{pos:0.75,color:'#D4380D'},{pos:1,color:'#5A1A00'}], outerStroke: [{color:'#8B2500',width:6},{color:'#FF4500',width:3}], glow: {color:'rgba(255,80,0,0.6)',blur:20} },
    blue_neon: { gradientStops: [{pos:0,color:'#003344'},{pos:0.25,color:'#006699'},{pos:0.45,color:'#00D4FF'},{pos:0.55,color:'#66E0FF'},{pos:0.75,color:'#006699'},{pos:1,color:'#003344'}], outerStroke: [{color:'#005577',width:6},{color:'#00AACC',width:3}], glow: {color:'rgba(0,212,255,0.7)',blur:22} },
    purple_glow: { gradientStops: [{pos:0,color:'#33004D'},{pos:0.25,color:'#660099'},{pos:0.45,color:'#BF00FF'},{pos:0.55,color:'#E066FF'},{pos:0.75,color:'#660099'},{pos:1,color:'#33004D'}], outerStroke: [{color:'#4A0070',width:6},{color:'#8B00CC',width:3}], glow: {color:'rgba(191,0,255,0.7)',blur:22} },
    white_glass: { gradientStops: [{pos:0,color:'#757575'},{pos:0.25,color:'#BDBDBD'},{pos:0.45,color:'#F5F5F5'},{pos:0.55,color:'#FFFFFF'},{pos:0.75,color:'#BDBDBD'},{pos:1,color:'#757575'}], outerStroke: [{color:'#9E9E9E',width:5},{color:'#E0E0E0',width:2}], glow: {color:'rgba(255,255,255,0.4)',blur:15} }
};

/** 核心状态 **/
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const canvasConfig = { width: 600, height: 800 };
let elements = [];
let selectedIndex = -1;
let isDragging = false;
let isDirty = false;
let layoutMode = 'side';
let history = [];
let historyIndex = -1;
const MAX_HISTORY = 30;

/** 初始化 **/
function init() {
    render();
    updateObjectList();
    saveState();
    document.addEventListener('paste', handlePaste);
    document.addEventListener('keydown', e => {
        if(e.key === 'Escape') hideUploadPanel();
        if((e.ctrlKey || e.metaKey) && e.key === 'z') {
            e.preventDefault();
            if(e.shiftKey) redo(); else undo();
        }
    });
    requestAnimationFrame(renderLoop);
}

function renderLoop() {
    if (isDirty) { render(); isDirty = false; }
    requestAnimationFrame(renderLoop);
}

function markDirty() { isDirty = true; }

/** 渲染 **/
function render() {
    ctx.clearRect(0, 0, canvasConfig.width, canvasConfig.height);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, canvasConfig.width, canvasConfig.height);
    
    elements.forEach((el, idx) => {
        if (el.visible === false) return;
        ctx.save();
        ctx.globalAlpha = el.opacity;
        if (el.type === 'image' || el.type === 'imageSlot') {
            ctx.translate(el.x, el.y);
            ctx.rotate(el.rotation * Math.PI / 180);
            const w = el.width * (el.scale || 1);
            const h = el.height * (el.scale || 1);
            if (el.img) {
                ctx.drawImage(el.img, -w/2, -h/2, w, h);
            } else if (el.type === 'imageSlot') {
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(-w/2, -h/2, w, h);
                ctx.strokeStyle = '#cccccc';
                ctx.setLineDash([6,4]);
                ctx.strokeRect(-w/2, -h/2, w, h);
                ctx.setLineDash([]);
                ctx.fillStyle = '#999';
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('点击替换', 0, 0);
            }
        } else if (el.type === 'text') {
            renderText(ctx, el);
        }
        ctx.restore();
        if (idx === selectedIndex) drawSelectionBox(el);
    });
}

function renderText(ctx, el) {
    ctx.save();
    ctx.translate(el.x, el.y);
    ctx.rotate(el.rotation * Math.PI / 180);
    ctx.textAlign = el.align;
    ctx.textBaseline = 'middle';
    const fontSize = el.fontSize * el.scale;
    ctx.font = `bold ${fontSize}px 'Noto Sans SC', 'Microsoft YaHei', Arial Narrow`;
    const preset = textPresetConfig[el.stylePreset] || textPresetConfig.normal;
    const w = getTextWidth(el);
    const h = el.fontSize;
    let offsetX = el.align === 'center' ? -w/2 : (el.align === 'right' ? -w : 0);
    
    if (el.stylePreset === 'normal') {
        const grad = ctx.createLinearGradient(offsetX, 0, offsetX + w, 0);
        grad.addColorStop(0, el.gradientColor1);
        grad.addColorStop(0.5, el.gradientColor2);
        grad.addColorStop(1, el.gradientColor1);
        ctx.fillStyle = grad;
        ctx.fillText(el.text, 0, 0);
        ctx.restore();
        return;
    }
    if (preset.depthLayers) preset.depthLayers.forEach(l => { ctx.fillStyle=l.color; ctx.fillText(el.text, l.offsetX, l.offsetY); });
    if (preset.outerStroke) preset.outerStroke.forEach(s => { ctx.strokeStyle=s.color; ctx.lineWidth=s.width; ctx.strokeText(el.text, 0, 0); });
    if (preset.gradientStops) {
        const grad = ctx.createLinearGradient(offsetX, 0, offsetX + w, 0);
        preset.gradientStops.forEach(s => grad.addColorStop(s.pos, s.color));
        ctx.fillStyle = grad;
    }
    ctx.fillText(el.text, 0, 0);
    if (preset.glow) { ctx.shadowColor=preset.glow.color; ctx.shadowBlur=preset.glow.blur; ctx.fillText(el.text,0,0); ctx.shadowBlur=0; }
    ctx.restore();
}

function drawSelectionBox(el) {
    ctx.save();
    ctx.translate(el.x, el.y);
    ctx.rotate(el.rotation * Math.PI / 180);
    let w, h;
    if (el.type === 'image' || el.type === 'imageSlot') {
        w = el.width * (el.scale || 1);
        h = el.height * (el.scale || 1);
    } else {
        w = getTextWidth(el);
        h = el.cache ? el.cache.textHeight : el.fontSize;
    }
    ctx.strokeStyle = el.locked ? '#666' : '#D4AF37';
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 5]);
    ctx.strokeRect(-w/2 - 5, -h/2 - 5, w + 10, h + 10);
    ctx.restore();
}

function getTextWidth(el) {
    if (!el.cache || el.cache.fontSize !== el.fontSize) {
        const tempCtx = document.createElement('canvas').getContext('2d');
        tempCtx.font = `bold ${el.fontSize}px 'Noto Sans SC'`;
        el.cache = { textWidth: tempCtx.measureText(el.text).width, textHeight: el.fontSize, fontSize: el.fontSize };
    }
    return el.cache.textWidth;
}

function imageToDataURL(img) {
    const t = document.createElement('canvas');
    t.width = img.width; t.height = img.height;
    t.getContext('2d').drawImage(img, 0, 0);
    return t.toDataURL('image/png');
}

function dataURLToImage(dataURL) {
    return new Promise(r => { const i = new Image(); i.onload = () => r(i); i.src = dataURL; });
}

/** 交互核心 **/
function getPointerPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

canvas.addEventListener('mousedown', handleStart);
canvas.addEventListener('touchstart', handleStart, {passive: false});
canvas.addEventListener('mousemove', handleMove);
canvas.addEventListener('touchmove', handleMove, {passive: false});
canvas.addEventListener('mouseup', handleEnd);
canvas.addEventListener('touchend', handleEnd);
canvas.addEventListener('mouseleave', handleEnd);
canvas.addEventListener('wheel', e => {
    e.preventDefault();
    if (selectedIndex >= 0 && !elements[selectedIndex].locked) {
        const el = elements[selectedIndex];
        el.scale = Math.max(0.1, Math.min(3, el.scale + (e.deltaY > 0 ? -0.05 : 0.05)));
        markDirty();
        updateControls();
    }
}, {passive: false});

function handleStart(e) {
    if(e.target !== canvas) return;
    const pos = getPointerPos(e);
    let found = false;
    for (let i = elements.length - 1; i >= 0; i--) {
        const el = elements[i];
        if (el.locked || el.visible === false) continue;
        let w, h;
        if (el.type === 'image' || el.type === 'imageSlot') {
            w = el.width * (el.scale || 1); h = el.height * (el.scale || 1);
        } else { w = getTextWidth(el); h = el.cache ? el.cache.textHeight : el.fontSize; }
        if (Math.abs(pos.x - el.x) < w/2 && Math.abs(pos.y - el.y) < h/2) {
            selectedIndex = i;
            if (el.type === 'imageSlot') {
                markDirty(); updateObjectList(); updateControls(); showUploadPanel(); return;
            }
            isDragging = true;
            dragStart = { x: pos.x - el.x, y: pos.y - el.y };
            found = true;
            markDirty(); updateObjectList(); updateControls();
            break;
        }
    }
    if (!found) { selectedIndex = -1; markDirty(); updateControls(); }
}

function handleMove(e) {
    if (!isDragging || selectedIndex < 0) return;
    e.preventDefault();
    const pos = getPointerPos(e);
    const el = elements[selectedIndex];
    el.x = pos.x - dragStart.x;
    el.y = pos.y - dragStart.y;
    markDirty();
    updateControlsInputsOnly();
}

function handleEnd() {
    if(isDragging) { isDragging = false; saveState(); }
}

function handleImageFile(file) {

            const el = { type: 'image', img: i, imgData: imageToDataURL(i), x: canvasConfig.width/2, y: canvasConfig.height/2, width: i.width*s, height: i.height*s, scale:1, rotation:0, opacity:1, name: file.name.replace(/\.[^/.]+$/, '').substring(0,15)||'图片', locked:false, visible:true };

            elements.unshift(el);
            selectedIndex = 0;
            markDirty(); updateObjectList(); updateControls(); saveState(); showToast('图片添加成功');
        };
        i.src = ev.target.result;
    };
    r.readAsDataURL(file);
}

/** 撤销与重做 **/
function serializeElements() {
    return JSON.stringify(elements.map(e => {
        const o = {...e};
        if(o.img) { o.imgData = imageToDataURL(o.img); delete o.img; }
        return o;
    }));
}

async function deserializeElements(json) {
    const arr = JSON.parse(json);
    for(let el of arr) {
        if(el.imgData) { el.img = await dataURLToImage(el.imgData); }
        if(el.type === 'text') el.cache = null;
    }
    return arr;
}

function saveState() {
    const state = serializeElements();
    if (historyIndex < history.length - 1) { history = history.slice(0, historyIndex + 1); }
    history.push(state);
    if (history.length > MAX_HISTORY) history.shift();
    historyIndex = history.length - 1;
    updateUndoRedoButtons();
}

async function undo() {
    if (historyIndex > 0) {
        historyIndex--;
        await restoreState(history[historyIndex]);
    }
}

async function redo() {
    if (historyIndex < history.length - 1) {
        historyIndex++;
        await restoreState(history[historyIndex]);
    }
}

async function restoreState(json) {
    const newEls = await deserializeElements(json);
    elements = newEls;
    selectedIndex = -1;
    markDirty();
    updateObjectList();
    updateControls();
    updateUndoRedoButtons();
}

function updateUndoRedoButtons() {
    document.getElementById('undoBtn').disabled = historyIndex <= 0;
    document.getElementById('redoBtn').disabled = historyIndex >= history.length - 1;
}

    a.href=URL.createObjectURL(b);
    a.click();
    showToast('项目已导出');
}

async function importProject(evt) {
    const f = evt.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = async e => {
        try {
            const data = JSON.parse(e.target.result);
            elements = [];
            for (const ed of data.elements) {
                if (ed.type === 'image' || ed.type === 'imageSlot') { const img = ed.imgData ? await dataURLToImage(ed.imgData) : null; elements.push({ ...ed, img }); }
                else { elements.push({ ...ed, cache: null }); }
            }
            selectedIndex = -1;
            markDirty(); updateObjectList(); updateControls(); saveState();
            showToast('项目导入成功');
        } catch(err) { console.error(err); showToast('导入失败'); }
    };
    r.readAsText(f);
}

function exportCanvas(transparent) {
    const ec = document.createElement('canvas');
    const scale = 2;
    ec.width = 600 * scale; ec.height = 800 * scale;
    const ectx = ec.getContext('2d');
    ectx.scale(scale, scale);
    if (!transparent) { ectx.fillStyle='#1a1a1a'; ectx.fillRect(0,0,600,800); }
    elements.forEach(el => {
        if(el.visible === false) return;
        ectx.save(); ectx.globalAlpha = el.opacity;
        if (el.type === 'text') renderText(ectx, el);
        else if (el.img) { ectx.translate(el.x, el.y); ectx.rotate(el.rotation*Math.PI/180); const w = el.width*(el.scale||1), h = el.height*(el.scale||1); ectx.drawImage(el.img, -w/2, -h/2, w, h); }
        ectx.restore();
    });
    const a = document.createElement('a');
    a.download = transparent?'poster-t.png':'poster.png';
    a.href=ec.toDataURL('image/png');
    a.click();
    showToast('已导出PNG');
}

/** 辅助UI **/
function showUploadPanel() { document.getElementById('uploadPanel').classList.add('show'); }
function hideUploadPanel() { document.getElementById('uploadPanel').classList.remove('show'); }
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

const dz = document.querySelector('.upload-panel-inner');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.style.borderColor = '#D4AF37'; });
dz.addEventListener('dragleave', () => dz.style.borderColor='#444');
dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.style.borderColor='#444';
    if(e.dataTransfer.files[0]) { handleImageFile(e.dataTransfer.files[0]); hideUploadPanel(); }
});

init();
</script>
